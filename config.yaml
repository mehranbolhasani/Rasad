# رصد — تنظیمات مرکزی
# فیدها، کلیدواژه‌ها و تنظیمات را اینجا ویرایش کنید.

site:
  title: "رصد — اخبار جنگ"
  description: "اخبار بحران با حداقل حجم. خلاصه‌های معتبر از منابع متعدد. بدون ردیابی."
  base_url: "https://rasad.today"

# فیدهای فارسی (بدون نیاز به ترجمه)
# فیدهای انگلیسی (ترجمه خودکار با GPT-4o-mini)
feeds:
  # --- منابع فارسی ---
  - name: بی‌بی‌سی فارسی
    url: "https://feeds.bbci.co.uk/persian/rss.xml"
    language: fa
  - name: رادیو فردا
    url: "https://www.radiofarda.com/api/zrttpol-vomx-tpeoogpi"
    language: fa
  - name: رادیو فردا - ایران
    url: "https://www.radiofarda.com/api/zpoqil-vomx-tpe_kip"
    language: fa
  - name: ایران اینترنشنال
    url: "https://www.iranintl.com/feed"
    language: fa

  # --- منابع انگلیسی (ترجمه خودکار) ---
  - name: NetBlocks
    url: "https://netblocks.org/feed"
    language: en
  # Reuters/AP via Google News RSS query feeds (پایدارتر از اسکرپ مستقیم HTML)
  - name: Reuters (Google News)
    url: "https://news.google.com/rss/search?q=site%3Areuters.com%20(iran%20OR%20israel%20OR%20middle%20east)&hl=en-US&gl=US&ceid=US%3Aen"
    language: en
    fallback_url: "bridges/reuters.xml"
    fallback_name: "Reuters (Bridge)"
    fallback_if_older_than_minutes: 120
  - name: AP News (Google News)
    url: "https://news.google.com/rss/search?q=site%3Aapnews.com%20(iran%20OR%20israel%20OR%20middle%20east)&hl=en-US&gl=US&ceid=US%3Aen"
    language: en
    fallback_url: "bridges/ap-live.xml"
    fallback_name: "AP Middle East (Bridge)"
    fallback_if_older_than_minutes: 120
  - name: Google News Iran
    url: "https://news.google.com/rss/topics/CAAqIQgKIhtDQkFTRGdvSUwyMHZNRE56YUhBU0FtVnVLQUFQAQ?hl=en-US&gl=US&ceid=US:en"
    language: en

# منابع غیر RSS که ابتدا به RSS محلی تبدیل می‌شوند.
# توجه: اسکرپ HTML ذاتا شکننده است و با تغییر ساختار سایت ممکن است نیاز به اصلاح selector داشته باشد.
bridge_feeds:
  output_dir: "bridges"
  sources:
    - name: Reuters
      slug: "reuters"
      enabled: true  # در حالت fallback برای Reuters (Google News) استفاده می‌شود
      include_in_main: false  # فقط fallback؛ به‌صورت فید مستقل وارد build.py نشود
      type: html
      url: "https://www.reuters.com/world/middle-east/"
      language: en
      max_items: 40
      selectors:
        items: 'article[data-testid="StoryCard"], li[data-testid="StoryCard"], article'
        title: 'a[data-testid="TitleLink"], h2 a, h3 a, a'
        link: 'a[data-testid="TitleLink"], h2 a, h3 a, a[href]'
        summary: 'p[data-testid="Body"], p'
        date: 'time[data-testid="DateLine"], time'

    - name: "AP Middle East"
      slug: "ap-live"
      enabled: true  # در حالت fallback برای AP News (Google News) استفاده می‌شود
      include_in_main: false  # فقط fallback؛ به‌صورت فید مستقل وارد build.py نشود
      type: html
      url: "https://apnews.com/hub/middle-east"
      language: en
      max_items: 60
      selectors:
        items: 'div.PagePromo, article, div[data-key], div[class*="PagePromo"]'
        title: 'a[data-key="card-headline"], h2 span, h2, h3 span, h3, a'
        link: 'a[href]'
        summary: 'div.PagePromo-description, p'
        date: 'bsp-timestamp, span[data-source="timestamp"], time'

    # - name: "Some API"
    #   slug: "some-api"
    #   type: json
    #   url: "https://api.example.com/v1/articles?topic=iran"
    #   language: en
    #   max_items: 40
    #   json_map:
    #     items: "data.articles"
    #     title: "headline"
    #     link: "url"
    #     summary: "abstract"
    #     date: "published_at"
# کلیدواژه‌ها: حداقل یک باید منطبق باشد (عنوان + خلاصه)
# شامل کلمات فارسی و انگلیسی برای فیلتر هر دو نوع فید
keywords:
  - ایران
  - اسرائیل
  - آمریکا
  - حمله
  - موشک
  - حمله هوایی
  - قطعی اینترنت
  - سپاه
  - حمله سایبری
  - تنش
  - درگیری
  - غزه
  - حزب‌الله
  - تهران
  - نتانیاهو
  - Iran
  - Israel
  - US
  - strikes
  - missiles
  - airstrike
  - internet blackout
  - IRGC
  - cyber attack
  - escalation
  - conflict
  - Gaza
  - Hezbollah
  - Tehran
  - IDF
  - Netanyahu

# فیلتر هوشمندتر:
# 1) حداقل یک کلیدواژه هسته‌ای باید وجود داشته باشد
# 2) مجموع امتیاز کلیدواژه‌ها باید حداقل 2 باشد
filtering:
  min_matches: 2
  required_keywords:
    - ایران
    - تهران
    - سپاه
    - تنگه هرمز
    - Iran
    - Tehran
    - IRGC
    - Hormuz
    - Kharg

summarization:
  mode: extractive  # extractive | ai
  max_sentences: 3

translation:
  mode: ai  # ai | free | none
  # ai: نیاز به OPENAI_API_KEY در محیط دارد (GPT-4o-mini، حدود ۲ تا ۴ دلار در ماه)
  # free: از deep-translator استفاده می‌کند (رایگان اما ممکن است ناپایدار باشد)
  # none: مقالات انگلیسی بدون ترجمه نمایش داده می‌شوند
  post_edit: true
  post_edit_limit: 12  # برای کنترل هزینه، فقط روی بخشی از ترجمه‌ها اعمال می‌شود

fetch:
  timeout_seconds: 10
  cache_file: ".rasad_cache.json"
  max_articles_per_feed: 50

grouper:
  similarity_threshold: 0.25
  confirmed_min_sources: 3
  secondary_title_threshold: 0.14
  secondary_time_window_hours: 6
  max_age_hours: 72
  live_mixed_similarity_threshold: 0.6
  live_penalty: 0.3
  source_diversity_bonus_cap: 0.15

output:
  dir: "output"
  latest_count: 12  # سبک‌تر برای اینترنت ضعیف: جدیدترین ۱۲ خبر
